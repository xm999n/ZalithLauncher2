name: Build APK

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: "on-failure"

      - name: Generate Keystore
        run: |
          rm -f ZalithLauncher/zalith_launcher.jks
          keytool -genkeypair \
            -alias movtery_zalith \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9999 \
            -keystore ZalithLauncher/zalith_launcher.jks \
            -storepass android \
            -keypass android \
            -dname "CN=build, OU=build, O=build, L=build, S=build, C=US"
      
      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleRelease -Darch=arm64
        env:
          STORE_PASSWORD: android
          KEY_PASSWORD: android

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release apk (arm64)
          path: |
            ZalithLauncher/build/outputs/apk/**/*.apk
